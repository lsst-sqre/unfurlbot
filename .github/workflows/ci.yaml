name: CI

env:
  # Current supported uv version. The uv documentation recommends pinning
  # this. The version should match the version used in .pre-commit-config.yaml
  # and frozen in uv.lock. It is updated by make update-deps.
  UV_VERSION: "0.11.21"

"on":
  merge_group: {}
  pull_request: {}
  push:
    branches-ignore:
      # These should always correspond to pull requests, so ignore them for
      # the push trigger and let them be triggered by the pull_request
      # trigger, avoiding running the workflow twice.  This is a minor
      # optimization so there's no need to ensure this is comprehensive.
      - "dependabot/**"
      - "gh-readonly-queue/**"
      - "renovate/**"
      - "tickets/**"
      - "u/**"
    tags:
      - "*"
  release:
    types: [published]

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run pre-commit
        run: uv run --only-group=lint pre-commit run --all-files

  test:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          version: ${{ env.UV_VERSION }}

      - name: Run tests with nox
        run: uv run --only-group=nox nox -s typing test-coverage

  build:
    needs: [lint, test]
    secrets: inherit
    uses: lsst-sqre/multiplatform-build-and-push/.github/workflows/build.yaml@v4
    with:
      images: ghcr.io/${{ github.repository }}
      # Build but don't push for dependabot PRs: no registry secrets are
      # available and we don't want dependency-bump images in the registry.
      push: >-
        ${{ (github.event_name == 'release' && github.event.action == 'published')
            || startsWith(github.head_ref, 'tickets/') }}

    # Build on releases, ticket-branch PRs (build + push), and dependabot PRs
    # (build only) so the required "build / manifest" check is reported.
    # This will still trigger on pull requests from untrusted repositories
    # whose branch names match our tickets/* branch convention, but in this
    # case the push will fail with an error since the secret won't be set.
    if: >
      (github.event_name == 'release' && github.event.action == 'published')
      || (github.event_name != 'merge_group'
          && (startsWith(github.head_ref, 'tickets/')
              || startsWith(github.head_ref, 'dependabot/')))
